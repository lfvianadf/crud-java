<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Login - Gerenciador de Notas</title>
    <style type="text/css">
        body {
            background-color: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .ui-panel-titlebar {
            background: #2196F3 !important;
            color: white !important;
            text-align: center;
        }
        .full-width {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</h:head>

<h:body>
    <div class="login-container">
        <h:form id="formLogin">
            <p:messages id="messages" showDetail="false" closable="true">
                <p:autoUpdate />
            </p:messages>

            <p:panel header="Acesso ao Sistema">
                <h:panelGrid columns="1" styleClass="full-width">
                    <p:outputLabel for="usuario" value="Usuário:" />
                    <p:inputText id="usuario" value="#{loginBean.usuario}"
                                 required="true" requiredMessage="Informe o usuário"
                                 style="width: 100%; margin-bottom: 15px;" />

                    <p:outputLabel for="senha" value="Senha:" />
                    <p:password id="senha" value="#{loginBean.senha}"
                                required="true" requiredMessage="Informe a senha"
                                style="width: 100%; margin-bottom: 15px;" />

                    <p:commandButton value="Entrar" action="#{loginBean.efetuarLogin}"
                                     icon="pi pi-sign-in"
                                     styleClass="ui-button-raised ui-button-primary"
                                     style="width: 100%; height: 40px;" />
                </h:panelGrid>
            </p:panel>
        </h:form>
    </div>
</h:body>
</html>
