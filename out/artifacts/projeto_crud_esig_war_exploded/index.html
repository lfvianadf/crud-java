<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/xml/ns/javaee"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/xml/ns/core">
<h:head><title>Gerenciador de Notas</title></h:head>
<h:body>
    <h:form id="formPrincipal">
        <p:panel header="Nova Nota">
            <h:panelGrid columns="2">
                <p:outputLabel value="Título:" />
                <p:inputText value="#{notaBean.nota.titulo}" />
                <p:outputLabel value="Texto:" />
                <p:inputTextarea value="#{notaBean.nota.texto}" />
                <p:commandButton value="Salvar" action="#{notaBean.salvar}" update="@form" />
            </h:panelGrid>
        </p:panel>

        <p:dataTable value="#{notaBean.notas}" var="n" style="margin-top:20px">
            <p:column headerText="ID" width="50">#{n.id}</p:column>
            <p:column headerText="Título">#{n.titulo}</p:column>
            <p:column headerText="Texto">#{n.texto}</p:column>
            <p:column headerText="Ações">
                <p:commandButton icon="pi pi-trash" action="#{notaBean.excluir(n)}" update="@form" />
            </p:column>
        </p:dataTable>
    </h:form>
</h:body>
</html>
