<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head><title>Gerenciador de Notas</title></h:head>
<h:body>
    <h:form id="formPrincipal">
        <p:panel header="Gerenciador de Notas - ESIG" style="margin-bottom:20px">
            <h:panelGrid columns="2" cellpadding="5">
                <p:outputLabel value="Título:" />
                <p:inputText value="#{notaBean.nota.titulo}" required="true" />

                <p:outputLabel value="Descrição:" />
                <p:inputTextarea value="#{notaBean.nota.texto}" rows="3" cols="30" />

                <p:commandButton value="Salvar Nota" action="#{notaBean.salvar}"
                                 update="tabelaNotas @form" icon="pi pi-check" />
            </h:panelGrid>
        </p:panel>

        <p:dataTable id="tabelaNotas" value="#{notaBean.notas}" var="n"
                     emptyMessage="Nenhuma nota cadastrada.">
            <p:column headerText="Título">#{n.titulo}</p:column>
            <p:column headerText="Data">#{n.dataCriacao}</p:column>
            <p:column headerText="Ações">
                <p:commandButton icon="pi pi-pencil"
                                 action="#{notaBean.editar(n)}"
                                 update="@form"
                                 process="@this"
                                 styleClass="ui-button-warning"
                                 style="margin-right:5px" />
                <p:commandButton icon="pi pi-trash"
                                 action="#{notaBean.excluir(n)}"
                                 update="tabelaNotas"
                                 process="@this"
                                 styleClass="ui-button-danger" />
            </p:column>
        </p:dataTable>
    </h:form>
</h:body>
</html>
